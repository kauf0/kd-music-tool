name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install npm deps
        run: npm install

      - name: Download UMT Linux
        run: |
          wget -q https://github.com/UnderminersTeam/UndertaleModTool/releases/download/0.8.4.1/UTMT_CLI_v0.8.4.1-Ubuntu.zip
          mkdir -p src-tauri/UTMT-linux
          unzip -q UTMT_CLI_v0.8.4.1-Ubuntu.zip -d src-tauri/UTMT-linux
          chmod +x src-tauri/UTMT-linux/UndertaleModCli

      - name: Build
        run: ./scripts/build-release.sh linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist-release/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm deps
        run: npm install

      - name: Download UMT Windows
        run: |
          Invoke-WebRequest -Uri "https://github.com/UnderminersTeam/UndertaleModTool/releases/download/0.8.4.1/UTMT_CLI_v0.8.4.1-Windows.zip" -OutFile "umt.zip"
          New-Item -ItemType Directory -Force -Path "src-tauri/UTMT-windows"
          Expand-Archive -Path "umt.zip" -DestinationPath "src-tauri/UTMT-windows"
          Copy-Item -Recurse "src-tauri/UTMT-windows" "src-tauri/UTMT"

      - name: Build
        run: npm run tauri build -- --no-bundle

      - name: Package
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $stage = New-Item -ItemType Directory -Path "staging"
          Copy-Item "src-tauri/target/release/kd-music-tool.exe" "$stage/"
          Copy-Item -Recurse "src-tauri/UTMT" "$stage/UTMT"
          $zip = "dist-release/kd-music-tool-v$version-windows.zip"
          New-Item -ItemType Directory -Force -Path "dist-release"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip
          Write-Host "done: $zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist-release/*.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux/*.zip
            windows/*.zip
